HOME_OFFSET =       2.0
HOME_SEARCH_VEL =   5.0
HOME_LATCH_VEL =    1.0
HOME_USE_INDEX =    NO
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE =     0
STEPGEN_MAXVEL =    125
STEPGEN_MAXACCEL =  750
P =                 60
I =                 40
D =                 1
FF0 =               0
FF1 =               0.4
FF2 =               0.01
BIAS =              0
DEADBAND =          0.0045
MAX_OUTPUT =        0
DIRSETUP =          10000
DIRHOLD =           10000
STEPLEN =           2500
STEPSPACE =         2500
STEP_SCALE =        1000

[AXIS_Z]
