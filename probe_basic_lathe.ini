MAX_ACCELERATION =  600
BACKLASH =          0.000
INPUT_SCALE =       200
OUTPUT_SCALE =      1.000
MIN_LIMIT =         -440
MAX_LIMIT =         2.0
HOME_OFFSET =       5.0
HOME_SEARCH_VEL =   5.0
HOME_LATCH_VEL =    1.0
HOME_USE_INDEX =    NO
HOME_IGNORE_LIMITS = YES
HOME_SEQUENCE =
STEPGEN_MAXVEL =    125
STEPGEN_MAXACCEL =  750
P =                 50
I =                 10
D =                 3
FF0 =               0
FF1 =               0.85
FF2 =               0.005
BIAS =              0
DEADBAND =          0.0045
MAX_OUTPUT =        0
