[EMC]
VERSION = 1.1
MACHINE = Murray Probe Basic Lathe
DEBUG = 0

[DISPLAY]
DISPLAY = probe_basic_lathe
BACK_TOOL_LATHE = 1
CONFIRM_EXIT = False
LOG_FILE = sim.log
LOG_LEVEL = DEBUG
PREFERENCE_FILE = sim.pref
CONFIG_FILE = custom_config.yml
CYCLE_TIME = 0.100
POSITION_OFFSET = MACHINE
POSITION_FEEDBACK = ACTUAL
DEFAULT_LINEAR_VELOCITY = 0.50000
MAX_LINEAR_VELOCITY = 5.000000
MIN_LINEAR_VELOCITY = 0.016670
DEFAULT_ANGULAR_VELOCITY = 12.000000
MAX_ANGULAR_VELOCITY = 180.000000
MIN_ANGULAR_VELOCITY = 1.666667
DEFAULT_SPINDLE_SPEED = 1000
MAX_SPINDLE_OVERRIDE = 1.5000000
MIN_SPINDLE_OVERRIDE = 0.500000
MAX_FEED_OVERRIDE = 2.000000
PROGRAM_PREFIX = ~/linuxcnc/nc_files
OPEN_FILE = ~/linuxcnc/nc_files/pb_examples/blank.ngc
INTRO_GRAPHIC = pbsplash.png
INTRO_TIME = 3
INCREMENTS = JOG 1mm 0.6mm 0.3mm 0.1mm 0.05mm 0.02mm
# USER_TABS_PATH = user_tabs/
USER_BUTTONS_PATH = user_buttons/
USER_DROS_PATH = user_dro_display/
DRO_DISPLAY = XZ
GEOMETRY = XZ
OFFSET_COLUMNS = XZ
TOOL_TABLE_COLUMNS = TXZIJDQR
KEYBOARD_JOG = true
KEYBOARD_JOG_SAFETY_OFF = false
POSITION = 0x0
SIZE = 1920x1080

[FILTER]
PROGRAM_EXTENSION = .nc,.txt,.tap Other NC files

[RS274NGC]
RS274NGC_STARTUP_CODE = G7 G18
PARAMETER_FILE = linuxcnc.var
SUBROUTINE_PATH = subroutines

[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
SERVO_PERIOD = 1000000

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[HAL]
HALUI = halui
HALFILE = hallib/Bantam_v1.hal
HALFILE = hallib/xhc-whb04b-6.hal
SHUTDOWN = hallib/shutdown.hal
POSTGUI_HALFILE = hallib/probe_basic_lathe_postgui.hal

[HALUI]

[TRAJ]
AXES = 2
SPINDLES = 1
COORDINATES = X Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
CYCLE_TIME = 0.010
MAX_LINEAR_VELOCITY = 100.00
NO_FORCE_HOMING = 1
# Axes sections ---------------------------------------------------------------

# First axis
[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = lathe.tbl
#TOOL_CHANGE_POSITION = 2 0 1
#TOOL_CHANGE_WITH_SPINDLE_ON = 1

[KINS]
KINEMATICS = trivkins coordinates=xz
JOINTS = 2

[AXIS_X]
MIN_LIMIT = -100
MAX_LIMIT = 1.0
MAX_VELOCITY = 100.0
MAX_ACCELERATION = 600.0

[JOINT_0]
TYPE =              LINEAR
HOME =              0.000
FERROR =            10
MIN_FERROR =        1.00
MAX_VELOCITY =      100
MAX_ACCELERATION =  600.0
